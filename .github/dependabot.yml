# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Convenciones de este repo:
#   · Cada workspace (raiz, backend, frontend) abre PRs con su propia etiqueta
#     (root / backend / frontend) y prefijo de commit para distinguirlos de un
#     vistazo.
#   · Se IGNORAN las actualizaciones de parche (semver-patch, X.Y.1 -> X.Y.2):
#     generaban 8-10 PRs triviales. Solo llegan minor y major, que si merecen
#     revision. Las actualizaciones de SEGURIDAD no se ven afectadas por este
#     ignore (Dependabot las abre igualmente).

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # Raiz del monorepo (workspaces)
    target-branch: "dev"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "root"
    commit-message:
      prefix: "deps(root)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  - package-ecosystem: "npm"
    directory: "/app/backend/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(backend)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  - package-ecosystem: "npm"
    directory: "/app/frontend/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Acciones de los workflows de GitHub Actions (.github/workflows/*). Mantiene
  # actions/checkout, actions/setup-node, upload-artifact, action-gh-release… al
  # día. Se fijan por major (p. ej. @v6), así que Dependabot solo abre PR para
  # saltos de major, no para parches (poco ruido).
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(actions)"


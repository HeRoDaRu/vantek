# CI — Validación de Vantek (tipos + tests)
#
# Comprueba el monorepo antes de fusionar a main y antes de empaquetar una
# release. Se ejecuta en tres situaciones:
#   · pull_request hacia main → BLOQUEA la fusión si los tests fallan (combínalo
#     con una regla de protección de rama que exija este check).
#   · push a dev → validación continua de la rama de trabajo.
#   · workflow_call → lo invoca release.yml para validar main antes de crear el
#     paquete con el tag vX.Y.Z.
#
# Corre en Ubuntu (rápido y barato); el empaquetado Windows vive en release.yml.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [dev]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

# Incluimos github.workflow en la clave para que la CI invocada por release.yml
# (workflow_call, github.workflow = "Release Windows") NO comparta grupo con la
# CI de push/pull_request (github.workflow = "CI") sobre el mismo ref: si no,
# ambas caen en el mismo grupo y `cancel-in-progress` las cancela mutuamente
# (aparece "The operation was canceled"). Cada workflow+ref se cancela solo a sí
# mismo en pushes rápidos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tipos y tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Node 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci --workspaces --include-workspace-root

      # better-sqlite3 es un módulo nativo. El prebuilt de prebuild-install no
      # siempre cubre el ABI del runner (Node 24.x → ABI 137), así que lo
      # compilamos SIEMPRE desde fuente (Ubuntu ya trae python3 + build-essential)
      # y verificamos que el binding existe, fallando claro si no.
      - name: Compilar better-sqlite3 desde fuente
        working-directory: node_modules/better-sqlite3
        run: |
          npm run build-release
          test -f build/Release/better_sqlite3.node \
            && echo "binding OK: build/Release/better_sqlite3.node" \
            || { echo "::error::better-sqlite3 no compiló el binding nativo"; exit 1; }

      - name: Comprobar tipos (backend)
        run: npx tsc --noEmit -p app/backend/tsconfig.json

      - name: Comprobar tipos (frontend)
        run: npx tsc --noEmit -p app/frontend/tsconfig.json

      - name: Ejecutar tests (backend + frontend)
        run: npm test

name: Release Windows

# Empaqueta Vantek para el despliegue Windows (Node portable + servicio NSSM).
# Se dispara al publicar un tag vX.Y.Z. Produce un único asset llamado
# "Vantek-<version>.zip" (p. ej. Vantek-1.2.3.zip, tomando la version de
# version.json / del tag) cuyo contenido raiz es el directorio de
# instalación (app/, launcher/, node_modules/, config/, templates/, puppeteer/,
# version.json, start.bat, install.ps1) MENOS node/ y tools/, que los aporta
# install.ps1 una
# sola vez. install.ps1 viaja dentro del zip para tener una única fuente de
# verdad: el instalador queda al día con cada actualización de la app.
#
# El launcher (launcher/launcher.js) e install.ps1 localizan el asset por
# patrón (Vantek-*.zip), no por nombre exacto, para tolerar la version en el
# nombre. El launcher lo descarga en cada actualización y lo extrae sobre el
# directorio de instalación.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej. 1.2.3, sin la v). Solo para ejecuciones manuales.'
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Verja de calidad: valida tipos + tests en Ubuntu (reutiliza ci.yml). Si algo
  # falla, el empaquetado Windows NO se ejecuta y el tag no produce release.
  test:
    name: Validar main
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: windows-latest

    env:
      # Puppeteer descarga Chromium aquí durante la instalación. Esta carpeta se
      # empaqueta luego como release/puppeteer y el launcher apunta a ella en
      # tiempo de ejecución (PUPPETEER_CACHE_DIR = <instalación>\puppeteer).
      PUPPETEER_CACHE_DIR: ${{ github.workspace }}\.puppeteer-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Resolver versión
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v',''
            $tag = $env:GITHUB_REF -replace '^refs/tags/',''
          } elseif ('${{ github.event.inputs.version }}' -ne '') {
            $v = '${{ github.event.inputs.version }}'
            $tag = "v$v"
          } else {
            # Ejecución manual sin input: versión de prueba (no se publica release).
            $v = '0.0.0-test'
            $tag = "v$v"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Versión a empaquetar: $v (tag $tag)"

      - name: Instalar dependencias (incluye Chromium de Puppeteer)
        shell: pwsh
        # El package-lock.json se regenera en Linux (make deps-update) y, por el
        # bug de npm con dependencias opcionales por plataforma (npm/cli#4828), NO
        # registra los binarios nativos win32-x64 (el bundler rolldown de Vite 8,
        # esbuild, lightningcss…). Con el lock incompleto presente, NI `npm ci` NI
        # `npm install` los instalan → `vite build` muere con "Cannot find native
        # binding". La solución (la que recomienda el propio error) es BORRAR el
        # lock y reinstalar, para que npm resuelva los binarios de ESTA
        # plataforma. La integridad de versiones ya la valida el job `test`
        # (ci.yml en Ubuntu con `npm ci`) antes de llegar aquí.
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item -Force package-lock.json -ErrorAction SilentlyContinue
          npm install --workspaces --include-workspace-root --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install fallo (codigo $LASTEXITCODE)" }

      - name: Descargar Chromium de Puppeteer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          npx puppeteer browsers install chrome
          if ($LASTEXITCODE -ne 0) { throw "puppeteer browsers install fallo (codigo $LASTEXITCODE)" }
          if (-not (Test-Path $env:PUPPETEER_CACHE_DIR)) {
            throw "Puppeteer no creo la cache en $env:PUPPETEER_CACHE_DIR"
          }
          Get-ChildItem $env:PUPPETEER_CACHE_DIR

      - name: Compilar frontend, backend y launcher
        shell: pwsh
        run: npm run build

      - name: Escribir version.json
        shell: pwsh
        run: |
          $v = '${{ steps.version.outputs.version }}'
          @{ version = $v } | ConvertTo-Json | Set-Content -Path version.json -Encoding utf8
          Get-Content version.json

      - name: Podar dependencias de desarrollo
        shell: pwsh
        run: npm prune --omit=dev --workspaces --include-workspace-root

      - name: Compilar better-sqlite3 desde fuente (ABI del runner)
        shell: pwsh
        # NO dependemos del prebuilt automático de `npm install`: forzamos la
        # compilación desde fuente para el ABI de ESTE Node (24 → node-v137),
        # igual que ci.yml hace en Linux. Deja el binario en
        # node_modules/better-sqlite3/build/Release/better_sqlite3.node, que es
        # lo que se empaqueta y lo que el cliente (mismo Node 24) carga. Se
        # ejecuta DESPUÉS de `npm prune` para que el binario sobreviva en el árbol
        # final. windows-latest trae MSVC + Python para node-gyp.
        run: |
          $ErrorActionPreference = 'Stop'
          npm run build-release --prefix node_modules/better-sqlite3
          if ($LASTEXITCODE -ne 0) { throw "No se pudo compilar better-sqlite3 desde fuente" }
          if (-not (Test-Path 'node_modules/better-sqlite3/build/Release/better_sqlite3.node')) {
            throw "No existe build/Release/better_sqlite3.node tras compilar"
          }

      - name: Verificar el binario nativo de better-sqlite3
        shell: pwsh
        # Salvaguarda: better-sqlite3 es un addon C++ atado a un major de Node y
        # NO se puede recompilar en el cliente (Node portable, sin compilador).
        # El ZIP debe llevar el binario para el MISMO major que instala
        # install.ps1. setup-node aquí usa ese major (24), así que si el binario
        # carga en el runner, cargará en el cliente. Si NO carga, abortamos para
        # no publicar un release roto (síntoma en cliente: "Could not locate the
        # bindings file … node-v137-win32-x64").
        run: |
          $ErrorActionPreference = 'Stop'
          node -e "const D=require('better-sqlite3'); const db=new D(':memory:'); db.pragma('journal_mode=WAL'); db.close(); console.log('better-sqlite3 OK en', process.version, 'ABI', process.versions.modules)"
          if ($LASTEXITCODE -ne 0) { throw "better-sqlite3 no carga en el Node del runner; no se empaqueta el release." }

      - name: Ensamblar carpeta de release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Copy-Tree($src, $dst) {
            if (-not (Test-Path $src)) { throw "No existe el origen: $src" }
            robocopy $src $dst /E /NFL /NDL /NJH /NJS /NP | Out-Null
            if ($LASTEXITCODE -ge 8) { throw "robocopy fallo: $src -> $dst (codigo $LASTEXITCODE)" }
            $global:LASTEXITCODE = 0
          }

          $rel = 'release'
          if (Test-Path $rel) { Remove-Item $rel -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "$rel\app\backend" | Out-Null
          New-Item -ItemType Directory -Force -Path "$rel\app\frontend" | Out-Null
          New-Item -ItemType Directory -Force -Path "$rel\launcher"     | Out-Null
          New-Item -ItemType Directory -Force -Path "$rel\config"       | Out-Null
          New-Item -ItemType Directory -Force -Path "$rel\templates"    | Out-Null

          # Backend compilado + manifiesto (necesario para resolver dependencias)
          Copy-Tree 'app\backend\dist' "$rel\app\backend\dist"
          Copy-Item 'app\backend\package.json' "$rel\app\backend\package.json"

          # Frontend compilado (Express lo sirve en Windows; incluye assets OCR)
          Copy-Tree 'app\frontend\dist' "$rel\app\frontend\dist"

          # node_modules de producción (hoisted en la raíz por npm workspaces).
          # Incluye better-sqlite3 (nativo, ABI Node 24 win-x64) y puppeteer.
          Copy-Tree 'node_modules' "$rel\node_modules"
          if (Test-Path 'app\backend\node_modules') {
            Copy-Tree 'app\backend\node_modules' "$rel\app\backend\node_modules"
          }

          # Refuerzo: copiamos EXPLÍCITAMENTE el binario nativo de better-sqlite3
          # por si el copiado masivo de node_modules lo omitiera (p. ej. por
          # reintentos/atributos de robocopy). El binario lo dejó la etapa
          # "Compilar better-sqlite3 desde fuente" en build/Release.
          $sqliteSrc = 'node_modules\better-sqlite3\build\Release\better_sqlite3.node'
          if (Test-Path $sqliteSrc) {
            $sqliteDstDir = "$rel\node_modules\better-sqlite3\build\Release"
            New-Item -ItemType Directory -Force -Path $sqliteDstDir | Out-Null
            Copy-Item $sqliteSrc (Join-Path $sqliteDstDir 'better_sqlite3.node') -Force
          } else {
            throw "No se encontro el binario de origen $sqliteSrc antes de ensamblar."
          }

          # Launcher compilado + scripts de servicio
          Copy-Item 'launcher\launcher.js'           "$rel\launcher\launcher.js"
          Copy-Item 'launcher\install-service.bat'   "$rel\launcher\install-service.bat"
          Copy-Item 'launcher\uninstall-service.bat' "$rel\launcher\uninstall-service.bat"

          # Plantillas de configuración (el launcher inicializa la config desde ellas)
          Copy-Item 'config\app.config.template.json'     "$rel\config\app.config.template.json"
          Copy-Item 'config\profile.config.template.json' "$rel\config\profile.config.template.json"

          # Plantillas de documentos (HTML/CSS de factura y presupuesto)
          Copy-Tree 'templates' "$rel\templates"

          # version.json, arranque manual, instalador y Chromium incluido.
          # install.ps1 viaja dentro del zip para tener una única fuente de
          # verdad: al actualizar la app, el instalador queda también al día.
          Copy-Item 'version.json' "$rel\version.json"
          Copy-Item 'start.bat'    "$rel\start.bat"
          Copy-Item 'install.ps1'  "$rel\install.ps1"
          Copy-Item 'install.ps1'  "$rel\README.md"
          Copy-Tree '.puppeteer-cache' "$rel\puppeteer"

          # Verja final: el binario nativo de better-sqlite3 DEBE haber llegado al
          # árbol empaquetado. Si no, abortamos (no se publica un ZIP que fallaría
          # en el cliente con "Could not locate the bindings file").
          $sqliteBin = "$rel\node_modules\better-sqlite3\build\Release\better_sqlite3.node"
          if (-not (Test-Path $sqliteBin)) {
            throw "El binario better_sqlite3.node NO llego al release ($sqliteBin). No se empaqueta un ZIP roto."
          }
          Write-Host "OK: better_sqlite3.node presente en el release ($((Get-Item $sqliteBin).Length) bytes)."

          Write-Host 'Contenido de release/:'
          Get-ChildItem $rel | Select-Object Name

      - name: Comprimir Vantek-<version>.zip
        shell: pwsh
        working-directory: release
        run: |
          $ErrorActionPreference = 'Stop'
          $v = '${{ steps.version.outputs.version }}'
          $zip = "..\Vantek-$v.zip"
          7z a -tzip -mx=5 $zip * | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "7z fallo (codigo $LASTEXITCODE)" }
          $size = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Vantek-$v.zip generado: $size MB"

      - name: Subir artefacto de prueba (solo ejecuciones manuales)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v6
        with:
          name: Vantek-release
          path: Vantek-*.zip
          retention-days: 7

      - name: Publicar release y subir asset
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Vantek ${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: Vantek-*.zip

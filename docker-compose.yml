services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend        # ← apunta al stage "backend" del Dockerfile unificado
    container_name: vantek-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - vantek-data-taller:/app/data
      - vantek-pdfs-taller:/app/data/pdfs
      - vantek-config-taller:/app/config
      - vantek-logs-taller:/app/logs
    networks:
      - vantek-internal
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/status', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx          # ← apunta al stage "nginx" del Dockerfile unificado
    container_name: vantek-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vantek-internal
    volumes:
      - vantek-pdfs-taller:/var/www/vantek/pdfs:ro

volumes:
  vantek-data-taller:
  vantek-pdfs-taller:
  vantek-config-taller:
  vantek-logs-taller:

networks:
  vantek-internal:
    driver: bridge
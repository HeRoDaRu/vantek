server {
    listen 80;
    server_name _;

    # ─── Frontend estático ────────────────────────────────────────────────────
    root /var/www/vantek/html;
    index index.html;

    # Gzip para mejorar rendimiento — los assets de Vite se comprimen bien
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache agresiva para los assets de Vite (tienen hash en el nombre)
    location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PDFs generados — servidos directamente por nginx sin pasar por Express
    # El volumen vantek-pdfs se monta aquí en modo read-only
    location /pdfs/ {
        alias /var/www/vantek/pdfs/;
        # Solo permite descarga, no listado de directorio
        autoindex off;
        # Forzar descarga en lugar de abrir en el navegador (opcional)
        # add_header Content-Disposition "attachment";
    }

    # ─── API — proxy al backend ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos — la generación de PDFs con Puppeteer puede tardar
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Tamaño máximo de body — para subida de imágenes de OCR
        client_max_body_size 20M;
    }

    # ─── SPA fallback ─────────────────────────────────────────────────────────
    # Todas las rutas que no sean /api ni /pdfs van a index.html
    # para que React Router maneje la navegación del lado del cliente
    location / {
        try_files $uri $uri/ /index.html;
    }
}